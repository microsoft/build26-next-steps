<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2a6c"/>
      <stop offset="50%" stop-color="#2b4cc7"/>
      <stop offset="100%" stop-color="#00c6ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)" rx="24"/>

  <!-- Title -->
  <text x="600" y="80"
        text-anchor="middle"
        fill="white"
        font-size="42"
        font-family="Segoe UI, Arial, sans-serif"
        font-weight="600">
    Your Journey
  </text>

  <!-- Row container -->

  <!-- COMPETE -->
  <g transform="translate(180,140)">
    <image href="./Compete.png" width="160" height="160"/>
    <text x="80" y="200"
          text-anchor="middle"
          fill="white"
          font-size="22"
          font-family="Segoe UI, Arial, sans-serif"
          font-weight="500">
      Compete
    </text>
  </g>

  <!-- LEARN -->
  <g transform="translate(520,140)">
    <image href="./Learn.png" width="160" height="160"/>
    <text x="80" y="200"
          text-anchor="middle"
          fill="white"
          font-size="22"
          font-family="Segoe UI, Arial, sans-serif"
          font-weight="500">
      Learn
    </text>
  </g>

  <!-- DEVELOP SKILLS -->
  <g transform="translate(860,140)">
    <image href="./Develop Skills.png" width="160" height="160"/>
    <text x="80" y="200"
          text-anchor="middle"
          fill="white"
          font-size="22"
          font-family="Segoe UI, Arial, sans-serif"
          font-weight="500">
      Develop Skills
    </text>
  </g>

</svg>
